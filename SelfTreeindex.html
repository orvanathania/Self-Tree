<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Self Tree</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #e9d5ff, #c084fc, #a855f7);
      overflow:hidden;
    }

    .container{
      width:90%;
      max-width:420px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);
      border:1px solid rgba(255,255,255,0.3);
      border-radius:30px;
      padding:35px 25px;
      text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .profile-img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      border:5px solid white;
      margin-bottom:15px;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
    }

    h1{
      color:white;
      font-size:32px;
      font-weight:700;
      margin-bottom:5px;
    }

    .username{
      color:#f5e9ff;
      margin-bottom:25px;
      font-size:14px;
    }

    .link-btn{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:15px;
      margin:12px 0;
      border:none;
      border-radius:18px;
      text-decoration:none;
      font-size:16px;
      font-weight:500;
      color:#6b21a8;
      background:white;
      transition:0.3s ease;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .link-btn:hover{
      transform:scale(1.04);
      background:#f3e8ff;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    .link-btn i{
      font-size:20px;
    }

    .footer{
      margin-top:25px;
      color:white;
      font-size:13px;
      opacity:0.8;
    }

    /* Floating circle background */
    .circle{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.15);
      animation: float 8s infinite ease-in-out;
    }

    .circle1{
      width:180px;
      height:180px;
      top:-50px;
      left:-50px;
    }

    .circle2{
      width:120px;
      height:120px;
      bottom:-30px;
      right:-20px;
      animation-delay:2s;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-20px);
      }
    }

  </style>
</head>
<body>

  <!-- Background Decoration -->
  <div class="circle circle1"></div>
  <div class="circle circle2"></div>

  <div class="container">

    <!-- Foto Profile -->
    <img src="https://i.pinimg.com/736x/89/57/6b/89576b8f0c7ef9f0e76d6f6d6b24c5df.jpg"
      alt="Profile"
      class="profile-img">

    <!-- Judul -->
    <h1>Self Tree</h1>
    <p class="username">@yourusername</p>

    <!-- Social Links -->
    <a href="https://instagram.com/" class="link-btn" target="_blank">
      <i class="fab fa-instagram"></i>
      Instagram
    </a>

    <a href="https://tiktok.com/" class="link-btn" target="_blank">
      <i class="fab fa-tiktok"></i>
      TikTok
    </a>

    <a href="https://youtube.com/" class="link-btn" target="_blank">
      <i class="fab fa-youtube"></i>
      YouTube
    </a>

    <a href="https://facebook.com/" class="link-btn" target="_blank">
      <i class="fab fa-facebook"></i>
      Facebook
    </a>

    <a href="mailto:youremail@gmail.com" class="link-btn">
      <i class="fas fa-envelope"></i>
      Email
    </a>

    <a href="https://wa.me/6281234567890" class="link-btn" target="_blank">
      <i class="fab fa-whatsapp"></i>
      WhatsApp
    </a>

    <div class="footer">
      Made with 💜 by Self Tree
    </div>

  </div>

</body>
</html>
